      operationId: updateUser
      x-audit: true
      parameters: [{$ref: "#/components/parameters/OptionalIdempotencyKey"}, {$ref: "#/components/parameters/IfMatch"}]
      requestBody: {$ref: "#/components/requestBodies/UserWrite"}

openapi: "3.1.0"
info:
  title: SenseFoundry API
  version: "0.1.0"
  description: AI-assisted Chinese dictionary compilation system API
servers:
  - url: http://localhost:8080/api/v1
security:
  - BearerAuth: []
tags:
  - {name: Authentication}
  - {name: Users}
  - {name: Submissions}
  - {name: Documents}
  - {name: Corpus Cards}
  - {name: Headwords}
  - {name: Reference Senses}
  - {name: Sense Matches}
  - {name: Clusters}
  - {name: Sense Candidates}
  - {name: Definition Drafts}
  - {name: Examples}
  - {name: Review Tasks}
  - {name: Reviews}
  - {name: Publications}
  - {name: Editions}
  - {name: Sync Manifests}
  - {name: Models}
  - {name: Prompt Templates}
  - {name: Audit Logs}

paths:
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      security: []
      responses:
        "200":
          description: Service is healthy
          headers: {ETag: {$ref: "#/components/headers/ETag"}, X-Trace-Id: {$ref: "#/components/headers/XTraceId"}}
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Health"}
        default: {$ref: "#/components/responses/Error"}
  /auth/me:
    get:
      tags: [Authentication]
      operationId: getCurrentUser
      summary: Get the authenticated Keycloak user
      responses:
        "200": {$ref: "#/components/responses/User"}
        default: {$ref: "#/components/responses/Error"}

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}, {$ref: "#/components/parameters/Cursor"}]
      responses:
        "200": {$ref: "#/components/responses/UserList"}
        default: {$ref: "#/components/responses/Error"}
    post:
      tags: [Users]
      operationId: createUser
      x-audit: true
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody: {$ref: "#/components/requestBodies/UserWrite"}
      responses:
        "201": {$ref: "#/components/responses/UserCreated"}
        default: {$ref: "#/components/responses/Error"}
  /users/{id}:
    parameters: [{$ref: "#/components/parameters/ResourceId"}]
    get:
      tags: [Users]
      operationId: getUser

openapi: "3.1.0"
info:
  title: SenseFoundry LLM Gateway
  version: "0.1.0"
  description: Evidence-constrained definition drafting gateway. LLM may only reference provided evidence_ids.
servers:
  - url: http://localhost:8001
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /draft-definition:
    post:
      summary: Draft definition from evidence
      operationId: draftDefinition
      description: |
        Generates a definition draft constrained to provided evidence only.
        The LLM MUST NOT invent sources, examples, or references beyond the provided evidence_ids.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftDefinitionRequest'
      responses:
        "200":
          description: Definition draft generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftDefinitionResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Insufficient evidence for drafting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: LLM API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    EvidenceItem:
      type: object
      required: [id, text, source]
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
          description: Actual corpus sentence as evidence
        source:
          type: string
          description: Source reference
    DraftDefinitionRequest:
      type: object
      required: [sense_candidate_id, headword, evidence_ids, evidence_items]
      properties:
        sense_candidate_id:
          type: string
          format: uuid
        headword:
          type: string
          description: Target character/word (e.g. 打)
        pos:
          type: string
          description: Part of speech hint
        cluster_description:
          type: string
          description: Cluster-derived semantic description hint
        evidence_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: |
            REQUIRED. All evidence the LLM is allowed to reference.
            LLM MUST NOT generate content citing sources outside this list.
        evidence_items:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceItem'
          description: Full content of evidence items
        prompt_template_id:
          type: string
          format: uuid
          description: Which prompt template to use
        max_tokens:
          type: integer
          default: 500
    DraftDefinitionResponse:
      type: object
      required: [draft_text, evidence_ids_used, model_version, prompt_template_id]
      properties:
        draft_text:
          type: string
          description: Generated definition draft (constrained to provided evidence only)
        evidence_ids_used:
          type: array
          items:
            type: string
            format: uuid
          description: |
            Subset of evidence_ids actually cited/used in the draft.
            MUST be a subset of request.evidence_ids.
        confidence_note:
          type: string
          description: Optional note about evidence coverage or gaps
        model_version:
          type: string
          description: Exact LLM model identifier used
        prompt_template_id:
          type: string
          format: uuid
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, error]
        llm_api_reachable:
          type: boolean

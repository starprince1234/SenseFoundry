services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: sensefoundry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: sensefoundry
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensefoundry"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-Admin_changeme1!}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx1g
      - "DISABLE_SECURITY_PLUGIN=true"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    environment:
      INFER_DEVICE: ${INFER_DEVICE:-cpu}
      MODEL_CACHE_DIR: /models
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      MLM_MODEL_REVISION: ${MLM_MODEL_REVISION:-main}
      RERANKER_MODEL_REVISION: ${RERANKER_MODEL_REVISION:-main}
    volumes:
      - model_cache:/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  llm-gateway:
    build:
      context: ./llm-gateway
      dockerfile: Dockerfile
    environment:
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      inference:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5

  warmup:
    image: curlimages/curl:latest
    depends_on:
      inference:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Starting model warmup..."
        for i in 1 2 3; do
          echo "Warmup attempt $$i/3..."
          if curl -sf -X POST http://inference:8000/models/warmup; then
            echo "Warmup succeeded on attempt $$i"
            exit 0
          fi
          echo "Attempt $$i failed, waiting 10s..."
          sleep 10
        done
        echo "ERROR: Warmup failed after 3 attempts. Inference service not ready."
        exit 1
    healthcheck:
      test: ["CMD-SHELL", "test -x /bin/sh"]
      interval: 10s
      timeout: 5s
      retries: 1
    restart: "no"

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  model_cache:

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sensefoundry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be injected by Doppler}
      POSTGRES_DB: sensefoundry
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensefoundry"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD must be injected by Doppler}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx1g
      - "DISABLE_SECURITY_PLUGIN=true"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be injected by Doppler}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be injected by Doppler}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be injected by Doppler}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET must be injected by Doppler}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    ports:
      - "127.0.0.1:8180:8080"
      - "192.168.137.1:8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 10s
      retries: 10

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    environment:
      INFER_DEVICE: ${INFER_DEVICE:-cpu}
      MODEL_CACHE_DIR: /models
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      MLM_MODEL_REVISION: ${MLM_MODEL_REVISION:-main}
      RERANKER_MODEL_REVISION: ${RERANKER_MODEL_REVISION:-main}
      MLM_MODEL_NAME: ${MLM_MODEL_NAME:-bert-base-chinese}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-BAAI/bge-reranker-base}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:?EMBEDDING_API_URL must be injected by Doppler}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:?EMBEDDING_API_KEY must be injected by Doppler}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:?EMBEDDING_MODEL must be injected by Doppler}
    volumes:
      - model_cache:/models
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  llm-gateway:
    build:
      context: ./llm-gateway
      dockerfile: Dockerfile
    environment:
      LLM_API_URL: ${LLM_API_URL:?LLM_API_URL must be injected by Doppler}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY must be injected by Doppler}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL must be injected by Doppler}
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be injected by Doppler}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      INFER_SERVICE_URL: http://inference:8000
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-sensefoundry}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sensefoundry
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/sensefoundry/protocol/openid-connect/certs
      SYNC_SIGNING_PRIVATE_KEY: ${SYNC_SIGNING_PRIVATE_KEY:?SYNC_SIGNING_PRIVATE_KEY must be injected by Doppler}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      inference:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
      - "192.168.137.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:15173:5173"
      - "192.168.137.1:15173:5173"
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api/v1}
      PUBLIC_KEYCLOAK_ISSUER: ${PUBLIC_KEYCLOAK_ISSUER:-http://localhost:8180/realms/sensefoundry}
      PUBLIC_OIDC_CLIENT_ID: ${PUBLIC_OIDC_CLIENT_ID:-frontend}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5

  warmup:
    image: curlimages/curl:latest
    depends_on:
      inference:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Starting model warmup..."
        for i in 1 2 3; do
          echo "Warmup attempt $$i/3..."
          if curl -sf -X POST http://inference:8000/models/warmup; then
            echo "Warmup succeeded on attempt $$i"
            exit 0
          fi
          echo "Attempt $$i failed, waiting 10s..."
          sleep 10
        done
        echo "ERROR: Warmup failed after 3 attempts. Inference service not ready."
        exit 1
    healthcheck:
      test: ["CMD-SHELL", "test -x /bin/sh"]
      interval: 10s
      timeout: 5s
      retries: 1
    restart: "no"

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  model_cache:
